<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Matrix Management Console</title>
    <style>
        :root {
            --bg-canvas: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --focus-ring: rgba(37, 99, 233, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-dark);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1680px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) {
            .dashboard-container { 
                grid-template-columns: 1fr; 
                gap: 16px;
            }
            body { padding: 12px; }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px -1px rgba(15, 23, 42, 0.03);
            display: flex;
            flex-direction: column;
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        h2 { 
            margin: 0; 
            font-weight: 600; 
            font-size: 1.1rem; 
            color: var(--text-dark); 
            letter-spacing: -0.01em;
        }

        .input-block { 
            margin-bottom: 14px; 
        }
        
        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        label { 
            font-size: 0.825rem; 
            color: var(--text-dark); 
            font-weight: 600;
        }

        .pill-badge {
            font-size: 0.7rem;
            background: var(--bg-input);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 500;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            user-select: none;
        }

        .checkbox-container input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dark);
            font-size: 0.875rem;
            transition: all 0.15s ease;
        }
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px var(--focus-ring);
            outline: none; 
        }

        input:disabled, select:disabled {
            background-color: #f8fafc;
            color: #94a3b8;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }
        .dimmed-label {
            color: #94a3b8 !important;
            transition: color 0.15s ease;
        }

        button {
            width: 100%;
            padding: 11px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.15s;
        }
        button:hover { background: var(--primary-hover); }

        .canvas-container {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
            aspect-ratio: 18 / 5.5; 
        }
        
        canvas {
            background: #ffffff;
            width: 100%; 
            height: auto;
            max-height: 100%;
            object-fit: contain;
        }

        .export-group {
            display: grid;
            grid-template-columns: 1fr 110px;
            gap: 8px;
            margin-top: 10px;
        }

        .control-hub-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 12px;
        }
        .sort-engine-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sort-label {
            font-size: 0.775rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .sort-select-dropdown {
            width: 210px;
            padding: 6px 10px;
            font-size: 0.775rem;
            border-radius: 6px;
            background-color: #ffffff;
            cursor: pointer;
        }
        .btn-direction-arrow {
            background: #ffffff;
            color: #0f172a;
            border: 1px solid var(--border);
            padding: 6px 12px;
            font-size: 0.775rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 135px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            transition: all 0.12s ease;
        }
        .btn-direction-arrow:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .matrix-view {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 560px; 
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.85rem; 
            min-width: 750px;
        }
        th { 
            background: #f8fafc; 
            color: var(--text-muted); 
            font-size: 0.725rem; 
            font-weight: 600; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            text-transform: uppercase;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
        td { 
            padding: 12px 14px; 
            border-bottom: 1px solid var(--border); 
            text-align: left;
            vertical-align: middle;
        }
        tr { transition: background 0.12s; cursor: pointer; }
        tr:hover { background: #f8fafc; }
        tr.selected { background: #f0f6ff; border-left: 4px solid var(--primary); }

        .sub-vector { display: block; font-size: 0.65rem; color: var(--text-muted); font-family: monospace; margin-top: 1px; }
        
        .simplified-diameter-badge {
            display: inline-block;
            background: #f8fafc;
            color: #334155;
            border: 1px solid #e2e8f0;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: monospace;
        }
        
        .status-msg { text-align: center; padding: 40px; font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="card">
        <div class="header-main">
            <h2>Optical Profile</h2>
            <span class="pill-badge" style="background: rgba(37, 99, 233, 0.08); color: var(--primary); font-weight: 600;">System Inputs</span>
        </div>
        
        <div class="input-block">
            <div class="label-container">
                <label for="f1">Objective Focal (L1)</label>
                <span class="pill-badge" id="liveP1">-- D</span>
            </div>
            <input type="number" id="f1" value="60" step="1" oninput="updateLiveMetrics()">
        </div>
        <div class="input-block">
            <div class="label-container">
                <label for="f2">Variator Focal (L2)</label>
                <span class="pill-badge" id="liveP2">-- D</span>
            </div>
            <input type="number" id="f2" value="-60" step="1" oninput="updateLiveMetrics()">
        </div>
        <div class="input-block">
            <div class="label-container">
                <label for="f3">Eyepiece Focal (L3)</label>
                <span class="pill-badge" id="liveP3">-- D</span>
            </div>
            <input type="number" id="f3" value="-10" step="1" oninput="updateLiveMetrics()">
        </div>
        <div class="input-block">
            <div class="label-container">
                <label for="targetM">Target Magnification</label>
            </div>
            <input type="number" id="targetM" value="120" step="1" oninput="updateLiveMetrics()">
        </div>

        <div class="input-block" style="border-top: 1px solid var(--border); padding-top: 14px; margin-top: 8px;">
            <label class="checkbox-container">
                <input type="checkbox" id="infinityCheck" checked onchange="toggleInfinityInput()">
                Object at Infinity (∞ Source)
            </label>
            
            <div id="distanceInputPanel">
                <div class="label-container">
                    <label id="distanceLabel" class="dimmed-label" for="objectDistance">Target Proximity Distance (km)</label>
                </div>
                <input type="number" id="objectDistance" value="500" step="1" disabled>
            </div>
        </div>
        
        <button onclick="computeMatrix()">Calculate Alignments</button>
        
        <div class="export-group">
            <button style="margin-top:0;" onclick="executeSystemExport()">Export</button>
            <select id="exportFormat" style="padding: 10px;">
                <option value="png">PNG Image</option>
                <option value="jpeg">JPEG Image</option>
                <option value="webp">WebP Image</option>
                <option value="svg">SVG Vector</option>
                <option value="json">JSON Data</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="header-main">
            <h2>Alignment Analysis Worksheet</h2>
        </div>
        
        <div class="canvas-container">
            <canvas id="opticalCanvas" width="7200" height="2200"></canvas>
        </div>

        <div class="control-hub-row">
            <div class="sort-engine-group">
                <span class="sort-label">Sort Sequence:</span>
                <select id="sortMetricSelect" class="sort-select-dropdown" onchange="renderMatrixTable()">
                    <option value="length" selected>Total System Length</option>
                    <option value="mag">Magnification</option>
                    <option value="accuracy">Most Accurate Magnification</option>
                </select>
                <button type="button" id="sortDirBtn" class="btn-direction-arrow" onclick="toggleSortDirection()">
                    Lowest First &darr;
                </button>
            </div>
        </div>

        <div class="matrix-view">
            <table>
                <thead>
                    <tr>
                        <th>Interval Gap 1 (d1)</th>
                        <th>Interval Gap 2 (d2)</th>
                        <th>System Output</th>
                        <th>Total System Length</th>
                        <th>Required Lens Diameter (Optimal Quality)</th>
                    </tr>
                </thead>
                <tbody id="matrixBody">
                    <tr><td colspan="5" class="status-msg">Processing alignment configurations...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let calculationCache = [];
let globalActiveDataset = null;

let isAscendingDirection = true; 

function updateLiveMetrics() {
    ['f1', 'f2', 'f3'].forEach((id, i) => {
        let val = parseFloat(document.getElementById(id).value);
        let diopter = val !== 0 ? (100 / val).toFixed(2) : "0.00";
        document.getElementById(`liveP${i+1}`).innerText = `${diopter} D`;
    });
}

function toggleInfinityInput() {
    const isInfinity = document.getElementById('infinityCheck').checked;
    const inputField = document.getElementById('objectDistance');
    const labelField = document.getElementById('distanceLabel');
    
    if (isInfinity) {
        inputField.disabled = true;
        labelField.classList.add('dimmed-label');
    } else {
        inputField.disabled = false;
        labelField.classList.remove('dimmed-label');
    }
}

function toggleSortDirection() {
    isAscendingDirection = !isAscendingDirection;
    const dirBtn = document.getElementById('sortDirBtn');
    
    // Updated arrow layout positions (Text first, followed by arrow suffix)
    if (isAscendingDirection) {
        dirBtn.innerHTML = 'Lowest First &darr;';
    } else {
        dirBtn.innerHTML = 'Highest First &uarr;';
    }
    
    renderMatrixTable();
}

function computeMatrix() {
    const f1 = parseFloat(document.getElementById('f1').value);
    const f2 = parseFloat(document.getElementById('f2').value);
    const f3 = parseFloat(document.getElementById('f3').value);
    const targetM = parseFloat(document.getElementById('targetM').value);
    const isInfinity = document.getElementById('infinityCheck').checked;
    
    const objectDistanceKm = parseFloat(document.getElementById('objectDistance').value);
    const objectDistance = isInfinity ? Infinity : objectDistanceKm * 100000;
    
    const step = targetM >= 100 ? 0.50 : 0.20; 
    calculationCache = [];

    const minScan = 0.5;
    const maxScan = 250; 
    let checkedCombinations = new Set();
    let dynamicWindow = targetM >= 100 ? (targetM * 0.25) : (targetM * 0.05);

    let dynamicF1 = f1;
    if (!isInfinity && objectDistance > 0 && objectDistance !== f1) {
        dynamicF1 = (objectDistance * f1) / (objectDistance - f1);
    }

    for (let d1 = minScan; d1 <= maxScan; d1 = parseFloat((d1 + step).toFixed(2))) {
        let s2 = d1 - dynamicF1; 
        if (s2 === f2 || s2 === 0) continue;
        let s2_prime = (s2 * f2) / (s2 - f2);

        for (let d2 = minScan; d2 <= maxScan; d2 = parseFloat((d2 + step).toFixed(2))) {
            let s3 = d2 - s2_prime;
            if (s3 === f3 || s3 === 0) continue;
            let s3_prime = (s3 * f3) / (s3 - f3);

            let sysMag = Math.abs((dynamicF1 * f3) / ((s2 * s3) - (f2 * (s2 + s3))));
            if (isNaN(sysMag) || !isFinite(sysMag)) continue;

            let diff = Math.abs(sysMag - targetM);

            if (diff <= dynamicWindow) {
                let comboKey = `${d1.toFixed(2)}_${d2.toFixed(2)}`;
                
                if (!checkedCombinations.has(comboKey)) {
                    checkedCombinations.add(comboKey);

                    let baseMin = 1.80 + (sysMag * 0.02);
                    let baseMax = 4.20 + (sysMag * 0.07);

                    calculationCache.push({
                        d1: d1,
                        d2: d2,
                        mag: parseFloat(sysMag.toFixed(2)),
                        total: parseFloat((d1 + d2).toFixed(2)),
                        diff: diff,
                        isInfinity: isInfinity,
                        objectDistanceKm: objectDistanceKm,
                        diameter: { 
                            min: Math.round(baseMin), 
                            max: Math.round(baseMax) 
                        }
                    });
                }
            }
        }
    }

    renderMatrixTable();
}

function renderMatrixTable() {
    const tbody = document.getElementById('matrixBody');
    const activeSortMetric = document.getElementById('sortMetricSelect').value;
    
    if (calculationCache.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="status-msg">
            <strong>Parameters Beyond Boundaries!</strong><br>
            No clear matching configuration was found. Adjust inputs.
        </td></tr>`;
        clearCanvas();
        return;
    }

    calculationCache.sort((a, b) => {
        let itemValA, itemValB;
        if (activeSortMetric === 'length') {
            itemValA = a.total; itemValB = b.total;
        } else if (activeSortMetric === 'mag') {
            itemValA = a.mag; itemValB = b.mag;
        } else if (activeSortMetric === 'accuracy') {
            itemValA = a.diff; itemValB = b.diff;
        }
        
        return isAscendingDirection ? (itemValA - itemValB) : (itemValB - itemValA);
    });

    tbody.innerHTML = '';

    calculationCache.forEach((dataset, index) => {
        let row = document.createElement('tr');
        if (index === 0) {
            row.className = 'selected';
            globalActiveDataset = dataset;
        }
        
        row.onclick = function() {
            document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            globalActiveDataset = dataset;
            drawSystemSchematic(dataset);
        };

        row.innerHTML = `
            <td><strong>${dataset.d1} cm</strong><span class="sub-vector">d1 offset</span></td>
            <td><strong>${dataset.d2} cm</strong><span class="sub-vector">d2 offset</span></td>
            <td><span style="color:var(--primary); font-weight:700; font-size:0.95rem;">${dataset.mag}x</span></td>
            <td><strong>${dataset.total} cm</strong><span class="sub-vector">Total track</span></td>
            <td>
                <div class="simplified-diameter-badge">
                    ${dataset.diameter.min} - ${dataset.diameter.max} cm
                </div>
            </td>
        `;
        tbody.appendChild(row);
    });

    drawSystemSchematic(calculationCache[0]);
}

function clearCanvas() {
    const canvas = document.getElementById('opticalCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawSystemSchematic(dataset) {
    const canvas = document.getElementById('opticalCanvas');
    const ctx = canvas.getContext('2d');
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const f1 = parseFloat(document.getElementById('f1').value);
    const f2 = parseFloat(document.getElementById('f2').value);
    const f3 = parseFloat(document.getElementById('f3').value);

    const railY = 1120;
    const paddingLeft = 1280; 
    const paddingRight = 1280;
    const workspaceWidth = canvas.width - paddingLeft - paddingRight;

    let p1 = paddingLeft;
    let p2 = p1 + (dataset.d1 / dataset.total) * workspaceWidth;
    let p3 = p1 + workspaceWidth;

    const minimumAllowedGapPx = 960; 
    if ((p2 - p1) < minimumAllowedGapPx) {
        let shift = minimumAllowedGapPx - (p2 - p1);
        p2 += shift;
        p3 += shift;
    }
    if ((p3 - p2) < minimumAllowedGapPx) {
        p3 = p2 + minimumAllowedGapPx;
    }

    const headerY = 220;

    ctx.fillStyle = '#0f172a';
    ctx.font = 'bold 104px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'left';
    let objectLabelText = dataset.isInfinity ? 'Object: Infinity' : `Object: ${dataset.objectDistanceKm} km away`;
    ctx.fillText(objectLabelText, 160, headerY);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#2563eb';
    ctx.font = 'bold 112px monospace';
    ctx.fillText(`Total: ${dataset.total.toFixed(1)} cm  |  Zoom: ${dataset.mag}x`, canvas.width / 2, headerY);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#0f172a';
    ctx.font = 'bold 104px system-ui, -apple-system, sans-serif';
    ctx.fillText(`Lens Dia: ${dataset.diameter.min} - ${dataset.diameter.max} cm`, canvas.width - 160, headerY);

    if (dataset.isInfinity) {
        ctx.strokeStyle = 'rgba(37, 99, 233, 0.14)';
        ctx.lineWidth = 16;
        const parallelOffsets = [-320, -160, 0, 160, 320];
        parallelOffsets.forEach(offset => {
            ctx.beginPath();
            ctx.moveTo(160, railY + offset);
            ctx.lineTo(p1, railY + offset);
            ctx.stroke();
        });

        ctx.fillStyle = '#2563eb';
        ctx.beginPath();
        ctx.arc(160, railY, 40, 0, 2 * Math.PI);
        ctx.fill();
    } else {
        ctx.strokeStyle = 'rgba(245, 158, 11, 0.22)';
        ctx.lineWidth = 16;
        const closePointX = 160;
        const peripheralOffsets = [-320, -160, 0, 160, 320];
        peripheralOffsets.forEach(offset => {
            ctx.beginPath();
            ctx.moveTo(closePointX, railY);
            ctx.lineTo(p1, railY + offset);
            ctx.stroke();
        });

        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.moveTo(closePointX, railY - 48);
        ctx.lineTo(closePointX + 40, railY);
        ctx.lineTo(closePointX, railY + 48);
        ctx.lineTo(closePointX - 40, railY);
        ctx.closePath();
        ctx.fill();
    }

    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 56;
    ctx.lineCap = 'square';
    ctx.beginPath();
    ctx.moveTo(p1 - 240, railY);
    ctx.lineTo(p3 + 240, railY);
    ctx.stroke();

    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 10;
    ctx.setLineDash([48, 40]);
    ctx.beginPath();
    ctx.moveTo(120, railY);
    ctx.lineTo(canvas.width - 120, railY);
    ctx.stroke();
    ctx.setLineDash([]); 

    function renderComponentLens(x, focal, heading) {
        const isConvex = focal >= 0;
        const lensHeight = 720;

        ctx.strokeStyle = isConvex ? '#047857' : '#b91c1c';
        ctx.fillStyle = isConvex ? '#10b981' : '#f43f5e';
        ctx.lineWidth = 20;

        ctx.beginPath();
        if (isConvex) {
            ctx.ellipse(x, railY, 80, lensHeight / 2, 0, 0, 2 * Math.PI);
        } else {
            ctx.rect(x - 56, railY - (lensHeight / 2), 112, lensHeight);
        }
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 100px system-ui, -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(heading, x, railY - 590); 

        ctx.fillStyle = '#64748b';
        ctx.font = '600 80px monospace';
        ctx.fillText(`f = ${focal} cm`, x, railY - 470); 
    }

    function renderDimensionLine(startX, endX, targetY, valueText, parameterCode) {
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 10;
        
        ctx.beginPath();
        ctx.moveTo(startX + 32, targetY);
        ctx.lineTo(endX - 32, targetY);
        ctx.stroke();

        ctx.fillStyle = '#2563eb';
        ctx.beginPath();
        ctx.moveTo(startX + 56, targetY - 24);
        ctx.lineTo(startX, targetY);
        ctx.lineTo(startX + 56, targetY + 24);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(endX - 56, targetY - 24);
        ctx.lineTo(endX, targetY);
        ctx.lineTo(endX - 56, targetY + 24);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        let displayText = `${parameterCode} = ${valueText}`;
        ctx.font = 'bold 80px monospace';
        let blockWidth = ctx.measureText(displayText).width + 56;

        ctx.fillRect(((startX + endX) / 2) - (blockWidth / 2), targetY - 64, blockWidth, 128);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 4;
        ctx.strokeRect(((startX + endX) / 2) - (blockWidth / 2), targetY - 64, blockWidth, 128);

        ctx.fillStyle = '#1d4ed8';
        ctx.textAlign = 'center';
        ctx.fillText(displayText, (startX + endX) / 2, targetY + 28);
    }

    renderComponentLens(p1, f1, 'Objective (L1)');
    renderComponentLens(p2, f2, 'Variator (L2)');
    renderComponentLens(p3, f3, 'Eyepiece (L3)');

    renderDimensionLine(p1, p2, railY + 640, `${dataset.d1.toFixed(1)} cm`, 'd1');
    renderDimensionLine(p2, p3, railY + 880, `${dataset.d2.toFixed(1)} cm`, 'd2');
}

function executeSystemExport() {
    if (!globalActiveDataset) {
        alert("Action blocked. Initialize application matrix calculation first.");
        return;
    }

    const format = document.getElementById('exportFormat').value;
    const canvas = document.getElementById('opticalCanvas');
    const f1 = document.getElementById('f1').value;
    const f2 = document.getElementById('f2').value;
    const f3 = document.getElementById('f3').value;

    if (format === 'json') {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(calculationCache, null, 4));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `optical_matrix_data_${Date.now()}.json`);
        dlAnchor.click();
    } 
    else if (format === 'svg') {
        let objectText = globalActiveDataset.isInfinity ? 'Infinity' : `${globalActiveDataset.objectDistanceKm} km away`;
        
        let svgContent = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 550" width="100%" height="100%">
            <rect width="100%" height="100%" fill="#ffffff"/>
            <text x="40" y="55" font-family="system-ui, sans-serif" font-weight="bold" font-size="26" fill="#0f172a">Object: ${objectText}</text>
            <text x="900" y="55" font-family="monospace" font-weight="bold" font-size="28" fill="#2563eb" text-anchor="middle">Total: ${globalActiveDataset.total.toFixed(1)} cm  |  Zoom: ${globalActiveDataset.mag}x</text>
            <text x="1760" y="55" font-family="system-ui, sans-serif" font-weight="bold" font-size="26" fill="#0f172a" text-anchor="end">Lens Dia: ${globalActiveDataset.diameter.min} - ${globalActiveDataset.diameter.max} cm</text>
            <line x1="30" y1="280" x2="1770" y2="280" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="12,10"/>
            <text x="500" y="145" font-family="system-ui, sans-serif" font-weight="bold" font-size="25" fill="#0f172a" text-anchor="middle">Objective (L1)</text>
            <text x="500" y="175" font-family="monospace" font-weight="600" font-size="20" fill="#64748b" text-anchor="middle">f = ${f1} cm</text>
            <text x="900" y="145" font-family="system-ui, sans-serif" font-weight="bold" font-size="25" fill="#0f172a" text-anchor="middle">Variator (L2)</text>
            <text x="900" y="175" font-family="monospace" font-weight="600" font-size="20" fill="#64748b" text-anchor="middle">f = ${f2} cm</text>
            <text x="1300" y="145" font-family="system-ui, sans-serif" font-weight="bold" font-size="25" fill="#0f172a" text-anchor="middle">Eyepiece (L3)</text>
            <text x="1300" y="175" font-family="monospace" font-weight="600" font-size="20" fill="#64748b" text-anchor="middle">f = ${f3} cm</text>
        </svg>`;

        const blob = new Blob([svgContent], {type: 'image/svg+xml;charset=utf-8'});
        const blobUrl = URL.createObjectURL(blob);
        const downloadLink = document.createElement('a');
        downloadLink.href = blobUrl;
        downloadLink.download = `optical_schematic_${Date.now()}.svg`;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
    else {
        let mimeType = 'image/png';
        let ext = 'png';
        if (format === 'jpeg') { mimeType = 'image/jpeg'; ext = 'jpg'; }
        if (format === 'webp') { mimeType = 'image/webp'; ext = 'webp'; }
        
        const imageURI = canvas.toDataURL(mimeType, 1.0);
        const downloadLink = document.createElement('a');
        downloadLink.download = `optical_schematic_4xHD_${Date.now()}.${ext}`;
        downloadLink.href = imageURI;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
}

updateLiveMetrics();
window.addEventListener('load', () => {
    computeMatrix();
});
</script>

</html>
