<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Matrix Management Console</title>
    <style>
        :root {
            --bg-canvas: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --focus-ring: rgba(37, 99, 233, 0.15);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-dark);
            padding: 30px;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            max-width: 1540px;
            width: 100%;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        h2 { margin: 0; font-weight: 600; font-size: 1.25em; color: var(--text-dark); letter-spacing: -0.01em;}

        .input-block { margin-bottom: 18px; }
        
        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        label { 
            font-size: 0.85em; 
            color: var(--text-dark); 
            font-weight: 600;
        }

        .pill-badge {
            font-size: 0.75em;
            background: var(--bg-input);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            font-weight: 600;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .hidden-panel {
            display: none;
            animation: fadeIn 0.2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, select {
            width: 100%;
            padding: 11px 14px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dark);
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px var(--focus-ring);
            outline: none; 
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
            font-size: 14px;
            margin-top: 10px;
        }
        button:hover { background: var(--primary-hover); }

        .canvas-container {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        canvas {
            background: #ffffff;
            width: 100%; 
            height: auto;
            max-height: 340px;
            box-shadow: inset 0 0 0 1px var(--border);
            border-radius: 4px;
        }

        .export-group {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 10px;
            margin-top: 15px;
        }

        .sort-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .sort-select {
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        .matrix-view {
            overflow-y: auto;
            max-height: 360px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: #f8fafc; color: var(--text-muted); font-size: 12px; font-weight: 600; position: sticky; top: 0; z-index: 10; text-transform: uppercase; letter-spacing: 0.05em;}
        tr { transition: background 0.15s; cursor: pointer; }
        tr:hover { background: #f8fafc; }
        tr.selected { background: #eff6ff; border-left: 4px solid var(--primary); }

        .sub-vector { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: monospace; }
        .diameter-tag { display: inline-block; padding: 2px 5px; border-radius: 4px; font-size: 10.5px; font-weight: 600; margin-right: 3px; }
        .dia-min { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .dia-avg { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .dia-max { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        
        .status-msg { text-align: center; padding: 45px; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .status-msg strong { color: var(--danger); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Configuration Controls -->
    <div class="card" style="display: flex; flex-direction: column; justify-content: flex-start;">
        <div class="header-main">
            <h2>Optical Profile</h2>
            <span class="pill-badge" style="background: rgba(37, 99, 233, 0.1); color: var(--primary);">Active Session</span>
        </div>
        
        <div class="input-block">
            <div class="label-container">
                <label for="f1">Objective Focal Length (L1)</label>
                <span class="pill-badge" id="liveP1">-- Diopters</span>
            </div>
            <input type="number" id="f1" value="60" step="1" oninput="updateLiveMetrics()">
        </div>
        <div class="input-block">
            <div class="label-container">
                <label for="f2">Variator Focal Length (L2)</label>
                <span class="pill-badge" id="liveP2">-- Diopters</span>
            </div>
            <input type="number" id="f2" value="-60" step="1" oninput="updateLiveMetrics()">
        </div>
        <div class="input-block">
            <div class="label-container">
                <label for="f3">Eyepiece Focal Length (L3)</label>
                <span class="pill-badge" id="liveP3">-- Diopters</span>
            </div>
            <input type="number" id="f3" value="-10" step="1" oninput="updateLiveMetrics()">
        </div>
        <div class="input-block">
            <div class="label-container">
                <label for="targetM">Target Magnification Scaling</label>
            </div>
            <input type="number" id="targetM" value="120" step="1" oninput="updateLiveMetrics()">
        </div>

        <!-- Target Proximity System Parameters -->
        <div class="input-block" style="border-top: 1px solid var(--border); padding-top: 15px; margin-top: 5px;">
            <label class="checkbox-container">
                <input type="checkbox" id="infinityCheck" checked onchange="toggleInfinityInput()">
                Object at Infinity (∞ Source)
            </label>
            
            <div id="distanceInputPanel" class="hidden-panel">
                <div class="label-container">
                    <label for="objectDistance">Object Target Distance</label>
                </div>
                <input type="number" id="objectDistance" value="500" step="1">
            </div>
        </div>
        
        <button onclick="computeMatrix()">Calculate System Alignments</button>
        
        <div class="export-group">
            <button style="margin-top:0;" onclick="executeSystemExport()">Export Output</button>
            <select id="exportFormat" style="padding: 11px;">
                <option value="png">PNG Image</option>
                <option value="jpeg">JPEG Image</option>
                <option value="json">JSON Dataset</option>
            </select>
        </div>
    </div>

    <!-- Analytics Dashboard Workspace -->
    <div class="card" style="display: flex; flex-direction: column;">
        <div class="header-main">
            <h2>Alignment Analysis Worksheet</h2>
        </div>
        
        <!-- High-Definition Render Canvas Workspace Component -->
        <div class="canvas-container">
            <canvas id="opticalCanvas" width="3160" height="1080"></canvas>
        </div>

        <div class="sort-container">
            <label for="sortOrder">Sort Matrix Sequence:</label>
            <select id="sortOrder" class="sort-select" onchange="renderMatrixTable()">
                <option value="length_asc" selected>Total Length: Shortest at Top</option>
                <option value="length_desc">Total Length: Longest at Top</option>
                <option value="accuracy">Target Accuracy: Nearest Match</option>
            </select>
        </div>

        <div class="matrix-view" style="flex-grow: 1;">
            <table>
                <thead>
                    <tr>
                        <th>Interval Gap 1 (d1)</th>
                        <th>Interval Gap 2 (d2)</th>
                        <th>System Output</th>
                        <th>Total System Length</th>
                        <th>Required Lens Diameter Profile (Optimal Quality)</th>
                    </tr>
                </thead>
                <tbody id="matrixBody">
                    <tr><td colspan="5" class="status-msg">Processing alignment configurations...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let calculationCache = [];
let globalActiveDataset = null;

function updateLiveMetrics() {
    ['f1', 'f2', 'f3'].forEach((id, i) => {
        let val = parseFloat(document.getElementById(id).value);
        let diopter = val !== 0 ? (100 / val).toFixed(2) : "0.00";
        document.getElementById(`liveP${i+1}`).innerText = `${diopter} Diopters`;
    });
}

function toggleInfinityInput() {
    const isInfinity = document.getElementById('infinityCheck').checked;
    const panel = document.getElementById('distanceInputPanel');
    panel.style.display = isInfinity ? 'none' : 'block';
}

function computeMatrix() {
    const f1 = parseFloat(document.getElementById('f1').value);
    const f2 = parseFloat(document.getElementById('f2').value);
    const f3 = parseFloat(document.getElementById('f3').value);
    const targetM = parseFloat(document.getElementById('targetM').value);
    const isInfinity = document.getElementById('infinityCheck').checked;
    const objectDistance = isInfinity ? Infinity : parseFloat(document.getElementById('objectDistance').value);
    
    const step = targetM >= 100 ? 0.50 : 0.20; 
    calculationCache = [];

    const minScan = 0.5;
    const maxScan = 250; 
    let checkedCombinations = new Set();
    let dynamicWindow = targetM >= 100 ? (targetM * 0.25) : (targetM * 0.05);

    // Dynamic shift calculation adjusting focal distance transformations for close projections
    let dynamicF1 = f1;
    if (!isInfinity && objectDistance > 0 && objectDistance !== f1) {
        dynamicF1 = (objectDistance * f1) / (objectDistance - f1);
    }

    for (let d1 = minScan; d1 <= maxScan; d1 = parseFloat((d1 + step).toFixed(2))) {
        let s2 = d1 - dynamicF1; 
        if (s2 === f2 || s2 === 0) continue;
        let s2_prime = (s2 * f2) / (s2 - f2);

        for (let d2 = minScan; d2 <= maxScan; d2 = parseFloat((d2 + step).toFixed(2))) {
            let s3 = d2 - s2_prime;
            if (s3 === f3 || s3 === 0) continue;
            let s3_prime = (s3 * f3) / (s3 - f3);

            let sysMag = Math.abs((dynamicF1 * f3) / ((s2 * s3) - (f2 * (s2 + s3))));
            if (isNaN(sysMag) || !isFinite(sysMag)) continue;

            let diff = Math.abs(sysMag - targetM);

            if (diff <= dynamicWindow) {
                let comboKey = `${d1.toFixed(2)}_${d2.toFixed(2)}`;
                
                if (!checkedCombinations.has(comboKey)) {
                    checkedCombinations.add(comboKey);

                    // Physical metrics calculated and normalized in standard Centimeters (cm)
                    let baseMin = 1.80 + (sysMag * 0.02);
                    let baseAvg = 2.80 + (sysMag * 0.04);
                    let baseMax = 4.20 + (sysMag * 0.07);

                    calculationCache.push({
                        d1: d1,
                        d2: d2,
                        mag: parseFloat(sysMag.toFixed(2)),
                        total: parseFloat((d1 + d2).toFixed(2)),
                        diff: diff,
                        isInfinity: isInfinity,
                        objectDistance: objectDistance,
                        diameter: { 
                            min: baseMin.toFixed(2), 
                            avg: baseAvg.toFixed(2), 
                            max: baseMax.toFixed(2) 
                        }
                    });
                }
            }
        }
    }

    renderMatrixTable();
}

function renderMatrixTable() {
    const tbody = document.getElementById('matrixBody');
    const sortValue = document.getElementById('sortOrder').value;
    
    if (calculationCache.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="status-msg">
            <strong>Parameters Beyond Boundaries!</strong><br>
            No clear matching configuration was found for the parameters specified. Adjust inputs.
        </td></tr>`;
        clearCanvas();
        return;
    }

    if (sortValue === 'length_asc') {
        calculationCache.sort((a, b) => a.total - b.total);
    } else if (sortValue === 'length_desc') {
        calculationCache.sort((a, b) => b.total - a.total);
    } else if (sortValue === 'accuracy') {
        calculationCache.sort((a, b) => a.diff - b.diff);
    }

    tbody.innerHTML = '';

    calculationCache.forEach((dataset, index) => {
        let row = document.createElement('tr');
        if (index === 0) {
            row.className = 'selected';
            globalActiveDataset = dataset;
        }
        
        row.onclick = function() {
            document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            globalActiveDataset = dataset;
            drawSystemSchematic(dataset);
        };

        row.innerHTML = `
            <td><strong>${dataset.d1} cm</strong><span class="sub-vector">Offset Track 1</span></td>
            <td><strong>${dataset.d2} cm</strong><span class="sub-vector">Offset Track 2</span></td>
            <td><span style="color:var(--primary); font-weight:700;">${dataset.mag}x</span><span class="sub-vector">Net Zoom Output</span></td>
            <td><strong>${dataset.total} cm</strong><span class="sub-vector">Total Tracking Length</span></td>
            <td>
                <div style="margin-bottom: 4px;">
                    <span class="diameter-tag dia-min">MIN: ${dataset.diameter.min} cm</span>
                    <span class="diameter-tag dia-avg">AVG: ${dataset.diameter.avg} cm</span>
                    <span class="diameter-tag dia-max">MAX: ${dataset.diameter.max} cm</span>
                </div>
                <span class="sub-vector">Clear Aperture Field Guidelines</span>
            </td>
        `;
        tbody.appendChild(row);
    });

    drawSystemSchematic(calculationCache[0]);
}

function clearCanvas() {
    const canvas = document.getElementById('opticalCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawSystemSchematic(dataset) {
    const canvas = document.getElementById('opticalCanvas');
    const ctx = canvas.getContext('2d');
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Canvas Background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const f1 = parseFloat(document.getElementById('f1').value);
    const f2 = parseFloat(document.getElementById('f2').value);
    const f3 = parseFloat(document.getElementById('f3').value);

    // Space planning geometry metrics
    const railY = 540;
    const paddingLeft = 450; 
    const paddingRight = 320;
    const workspaceWidth = canvas.width - paddingLeft - paddingRight;

    let p1 = paddingLeft;
    let p2 = p1 + (dataset.d1 / dataset.total) * workspaceWidth;
    let p3 = p1 + workspaceWidth;

    // Safety checks guaranteeing labels and elements never cross paths or overlap
    const minimumAllowedGapPx = 350;
    if ((p2 - p1) < minimumAllowedGapPx) {
        let shift = minimumAllowedGapPx - (p2 - p1);
        p2 += shift;
        p3 += shift;
    }
    if ((p3 - p2) < minimumAllowedGapPx) {
        p3 = p2 + minimumAllowedGapPx;
    }

    // Dynamic scale adjustment to fit content safely inside view bounds
    const maxBoundaryNeeded = p3 + 120;
    if (maxBoundaryNeeded > canvas.width) {
        const structuralScaleFactor = (canvas.width - paddingLeft - paddingRight) / (maxBoundaryNeeded - paddingLeft);
        p2 = p1 + (p2 - p1) * structuralScaleFactor;
        p3 = p1 + (p3 - p1) * structuralScaleFactor;
    }

    // 1. Dynamic Ray Tracing & Target Proximity Vector Engine
    if (dataset.isInfinity) {
        // Draw Infinite Source Parallel Rays
        ctx.strokeStyle = 'rgba(37, 99, 233, 0.15)';
        ctx.lineWidth = 5;
        const parallelOffsets = [-180, -90, 0, 90, 180];
        parallelOffsets.forEach(offset => {
            ctx.beginPath();
            ctx.moveTo(50, railY + offset);
            ctx.lineTo(p1, railY + offset);
            ctx.stroke();
        });

        // Infinity Source Glyph Node
        ctx.fillStyle = '#2563eb';
        ctx.beginPath();
        ctx.arc(100, railY, 16, 0, 2 * Math.PI);
        ctx.fill();
        
        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 36px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText('Object at Infinity (∞)', 140, railY + 12);
    } else {
        // Draw Converging Rays from Fixed Point Source
        ctx.strokeStyle = 'rgba(245, 158, 11, 0.25)';
        ctx.lineWidth = 5;
        
        const closePointX = 120;
        const peripheralOffsets = [-180, -90, 0, 90, 180];
        peripheralOffsets.forEach(offset => {
            ctx.beginPath();
            ctx.moveTo(closePointX, railY);
            ctx.lineTo(p1, railY + offset);
            ctx.stroke();
        });

        // Proximity Target Node Graphic
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.moveTo(closePointX, railY - 20);
        ctx.lineTo(closePointX + 16, railY);
        ctx.lineTo(closePointX, railY + 20);
        ctx.lineTo(closePointX - 16, railY);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 34px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(`Target Distance: ${dataset.objectDistance} cm`, 160, railY + 12);
    }

    // 2. Optical Centerline Reference Axis
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 36;
    ctx.lineCap = 'square';
    ctx.beginPath();
    ctx.moveTo(p1 - 50, railY);
    ctx.lineTo(p3 + 50, railY);
    ctx.stroke();

    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 4;
    ctx.setLineDash([20, 15]);
    ctx.beginPath();
    ctx.moveTo(40, railY);
    ctx.lineTo(canvas.width - 40, railY);
    ctx.stroke();
    ctx.setLineDash([]); 

    // 3. Elements Profile Presentation Layout Engine
    function renderComponentLens(x, focal, heading) {
        const isConvex = focal >= 0;
        const lensHeight = 340;

        ctx.strokeStyle = isConvex ? '#047857' : '#b91c1c';
        ctx.fillStyle = isConvex ? '#10b981' : '#f43f5e';
        ctx.lineWidth = 8;

        ctx.beginPath();
        if (isConvex) {
            ctx.ellipse(x, railY, 36, lensHeight / 2, 0, 0, 2 * Math.PI);
        } else {
            ctx.rect(x - 24, railY - (lensHeight / 2), 48, lensHeight);
        }
        ctx.fill();
        ctx.stroke();

        // Upper Metadata Profile Stack
        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 38px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(heading, x, railY - 220);

        ctx.fillStyle = '#64748b';
        ctx.font = '600 32px monospace';
        ctx.fillText(`f = ${focal} cm`, x, railY - 175);
    }

    // 4. Dimensions Vector Graphics Engine (Stacked to prevent overlap)
    function renderDimensionLine(startX, endX, targetY, valueText, parameterCode) {
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.moveTo(startX + 12, targetY);
        ctx.lineTo(endX - 12, targetY);
        ctx.stroke();

        // Structural Arrow Heads
        ctx.fillStyle = '#2563eb';
        ctx.beginPath();
        ctx.moveTo(startX + 26, targetY - 14);
        ctx.lineTo(startX, targetY);
        ctx.lineTo(startX + 26, targetY + 14);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(endX - 26, targetY - 14);
        ctx.lineTo(endX, targetY);
        ctx.lineTo(endX - 26, targetY + 14);
        ctx.fill();

        // Measurement indicator block label text
        ctx.fillStyle = '#ffffff';
        let displayText = `${parameterCode} = ${valueText}`;
        ctx.font = 'bold 32px monospace';
        let blockWidth = ctx.measureText(displayText).width + 30;

        ctx.fillRect(((startX + endX) / 2) - (blockWidth / 2), targetY - 30, blockWidth, 60);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.strokeRect(((startX + endX) / 2) - (blockWidth / 2), targetY - 30, blockWidth, 60);

        ctx.fillStyle = '#1d4ed8';
        ctx.textAlign = 'center';
        ctx.fillText(displayText, (startX + endX) / 2, targetY + 11);
    }

    // Plot System Elements 
    renderComponentLens(p1, f1, 'Objective (L1)');
    renderComponentLens(p2, f2, 'Variator (L2)');
    renderComponentLens(p3, f3, 'Eyepiece (L3)');

    // Plan space paths cleanly to separate projection tracks
    renderDimensionLine(p1, p2, railY + 360, `${dataset.d1.toFixed(1)} cm`, 'd1');
    renderDimensionLine(p2, p3, railY + 440, `${dataset.d2.toFixed(1)} cm`, 'd2');

    // 5. Consolidated Clear Aperture Dimension Requirements Panel
    const diameterPanelY = 110;
    const panelStartX = 50;
    
    // Clear backplane shadow box for system status presentation
    ctx.fillStyle = '#f8fafc';
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 3;
    ctx.fillRect(panelStartX, diameterPanelY - 50, 1140, 100);
    ctx.strokeRect(panelStartX, diameterPanelY - 50, 1140, 100);

    ctx.fillStyle = '#0f172a';
    ctx.font = 'bold 32px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('Required Lens Diameters:', panelStartX + 25, diameterPanelY + 10);

    ctx.font = 'bold 30px monospace';
    ctx.fillStyle = '#475569';
    ctx.fillText(`MIN: ${dataset.diameter.min} cm`, panelStartX + 460, diameterPanelY + 10);
    ctx.fillStyle = '#1e40af';
    ctx.fillText(`AVG: ${dataset.diameter.avg} cm`, panelStartX + 690, diameterPanelY + 10);
    ctx.fillStyle = '#065f46';
    ctx.fillText(`MAX: ${dataset.diameter.max} cm`, panelStartX + 920, diameterPanelY + 10);

    // 6. Right Aligned Global Specifications Header Dashboard Layer
    ctx.textAlign = 'right';
    ctx.fillStyle = '#2563eb';
    ctx.font = 'bold 38px monospace';
    ctx.fillText(`TOTAL RAIL LENGTH: ${dataset.total.toFixed(1)} cm`, canvas.width - 50, diameterPanelY - 15);
    ctx.fillStyle = '#059669';
    ctx.font = 'bold 34px monospace';
    ctx.fillText(`Calculated Scale Output: ${dataset.mag}x Zoom`, canvas.width - 50, diameterPanelY + 35);
}

function executeSystemExport() {
    if (!globalActiveDataset) {
        alert("Action blocked. Initialize application matrix calculation first.");
        return;
    }

    const format = document.getElementById('exportFormat').value;
    const canvas = document.getElementById('opticalCanvas');

    if (format === 'json') {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(calculationCache, null, 4));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `optical_alignment_matrix_${Date.now()}.json`);
        dlAnchor.click();
    } else {
        let mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
        let fileExtension = format === 'jpeg' ? 'jpg' : 'png';
        
        const imageURI = canvas.toDataURL(mimeType, 1.0);
        const downloadLink = document.createElement('a');
        downloadLink.download = `optical_schematic_hd_${Date.now()}.${fileExtension}`;
        downloadLink.href = imageURI;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
}

// System initialization hooks
updateLiveMetrics();
window.addEventListener('load', () => {
    computeMatrix();
});
